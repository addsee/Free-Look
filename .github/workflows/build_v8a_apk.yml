name: Build arm64-v8a APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
        cache: 'gradle'

    - name: Generate Gradle Wrapper
      run: gradle wrapper

    - name: Grant Execute Permission for Gradle
      run: chmod +x gradlew

    # توليد keystore رسمي للـ Debug لضمان صلاحية الحزمة وتوقيعها
    - name: Generate Debug Keystore
      run: |
        mkdir -p ~/.android
        keytool -genkey -v -keystore ~/.android/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"

    - name: Create Dummy Google Services JSON
      run: |
        echo '{"project_info":{"project_number":"123","project_id":"dummy","storage_bucket":"dummy.appspot.com"},"client":[{"client_info":{"mobilesdk_app_id":"1:123:android:123","android_client_info":{"package_name":"com.aistudio.nazrahorra.kbtyxl"}},"api_key":[{"current_key":"dummy_key"}]}]}' > app/google-services.json

    # بناء النسخة النظيفة الكاملة دون حقن أبيات داخلية قد تفسد الـ Manifest
    - name: Build APK
      run: ./gradlew assembleDebug

    # رفع الملف المستخرج من المسار الرسمي الصحيح (outputs وليس intermediates)
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Free-Look-Debug-APK
        path: app/build/outputs/apk/debug/*.apk
